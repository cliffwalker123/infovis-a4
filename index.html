<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Information Visualization - Zooming and Lenses</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    
    <!-- the lens is simulated with an svg circle --> 
    <svg class="cy" width="10000" height="10000">
      <circle 
        id="lens" 
        class="cy" 
        cx="50" 
        cy="50" 
        r="40" 
        stroke="green" 
        stroke-width="1" 
        fill="none" 
      />
    </svg>
    
    <!-- cytoscape draws the graph in this div -->
    <div class="cy" id="cy"></div>
    
    
    <div id="config" class="config">
      <label class="control">
        <input id="show-star-charts" type="checkbox" checked />
        Show star charts
      </label>

      <label class="control">
        <input id="highlight-lens-edges" type="checkbox" checked />
        Highlight lens edges
      </label>

      <label class="control" for="lens-radius">
        Lens radius
        <input id="lens-radius" type="range" min="30" max="220" value="80" />
        <output id="lens-radius-value" for="lens-radius">80</output>
      </label>
    </div>
    
  </body>

  <!-- dependencies -->
  <script src="libs/d3-7.9.0.js"></script>
  <script src="libs/radar-chart.js"></script>
  <script src="libs/radar-chart2.js"></script>
  <script src="libs/cytoscape-3.24.0.js"></script>
  <script src="libs/cola-3.3.8.js"></script>
  <script src="libs/cyto-cola-2.2.3.js"></script>

  <!-- the magic goes in these files! -->
  <script src="style.js" type="module"></script>
  <script src="script.js" type="module"></script>
</html>
